<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Translator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1 class="logo">🌐 Live Language Translator</h1>

<div class="translator">

<!-- INPUT -->

<div class="card">

<select id="fromLang">

<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="es">Spanish</option>
<option value="fr">French</option>
<option value="de">German</option>
<option value="it">Italian</option>
<option value="ru">Russian</option>
<option value="pt">Portuguese</option>
<option value="ja">Japanese</option>
<option value="ko">Korean</option>
<option value="zh">Chinese</option>
<option value="ar">Arabic</option>
<option value="tr">Turkish</option>
<option value="nl">Dutch</option>
<option value="sv">Swedish</option>

</select>

<textarea id="inputText" placeholder="Type text..."></textarea>

<div class="info">
<span id="charCount">0</span> characters
</div>

<div class="actions">

<button id="voiceBtn">🎤</button>
<button id="copyInput">📋</button>
<button id="speakInput">🔊</button>

</div>

</div>

<!-- SWAP -->

<button id="swapBtn" class="swap">⇄</button>

<!-- OUTPUT -->

<div class="card">

<select id="toLang">

<option value="hi">Hindi</option>
<option value="en">English</option>
<option value="es">Spanish</option>
<option value="fr">French</option>
<option value="de">German</option>
<option value="it">Italian</option>
<option value="ru">Russian</option>
<option value="pt">Portuguese</option>
<option value="ja">Japanese</option>
<option value="ko">Korean</option>
<option value="zh">Chinese</option>
<option value="ar">Arabic</option>
<option value="tr">Turkish</option>
<option value="nl">Dutch</option>
<option value="sv">Swedish</option>

</select>

<textarea id="outputText" readonly placeholder="Translation..."></textarea>

<div class="actions">

<button id="copyOutput">📋</button>
<button id="speakOutput">🔊</button>

</div>

</div>

</div>

<!-- HISTORY -->

<div class="history">

<div class="historyHeader">

<h3>History</h3>

<button id="clearHistory">Clear</button>

</div>

<div id="historyBox"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
